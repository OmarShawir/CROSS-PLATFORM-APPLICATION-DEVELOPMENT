<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Task Board - Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>My Task Board</h1>
        <span id="totalCounter" class="badge">0 tasks</span>

        <div class="filter-group">
            <label for="filterPriority">Filter by Priority:</label>
            <select id="filterPriority">
                <option value="all">All</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </div>
    </header>

    <main class="board">
        <section id="todo" class="column">
            <h2>To Do</h2>
            <ul id="todoList" class="task-list"></ul>
            <button class="add-btn" data-column="todo">+ Add Task</button>
        </section>

        <section id="inprogress" class="column">
            <h2>In Progress</h2>
            <ul id="inprogressList" class="task-list"></ul>
            <button class="add-btn" data-column="inprogress">+ Add Task</button>
        </section>

        <section id="done" class="column">
            <div class="column-header">
                <h2>Done</h2>
                <button id="clearDoneBtn" class="clear-btn">Clear All</button>
            </div>
            <ul id="doneList" class="task-list"></ul>
            <button class="add-btn" data-column="done">+ Add Task</button>
        </section>
    </main>

    <div id="taskModal" class="modal is-hidden">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Task</h2>

            <label>Title *</label>
            <input type="text" id="taskTitleInput" placeholder="Task title">

            <label>Description</label>
            <textarea id="taskDescInput" rows="3" placeholder="Task description..."></textarea>

            <label>Priority</label>
            <select id="taskPriorityInput">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>

            <label>Due Date</label>
            <input type="date" id="taskDateInput">

            <div class="modal-actions">
                <button id="saveTaskBtn" class="primary-btn">Save</button>
                <button id="cancelTaskBtn" class="secondary-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>
</body>

</html>
